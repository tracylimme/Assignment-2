<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Contact Form</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

body{
background:#e8f0ed;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:450px;
background:white;
padding:35px;
border-radius:10px;
border:1px solid #dcdcdc;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:25px;
color:#333;
}

.row{
display:flex;
gap:15px;
}

.input-group{
margin-bottom:18px;
width:100%;
}

label{
font-size:14px;
font-weight:600;
color:#444;
margin-bottom:6px;
display:block;
}

input[type="text"],
input[type="email"],
textarea{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
transition:0.3s;
}

input:focus,
textarea:focus{
border-color:#1a7f64;
outline:none;
box-shadow:0 0 4px rgba(26,127,100,0.3);
}

.radio-group{
display:flex;
gap:25px;
margin-top:5px;
font-size:14px;
}

.radio-group input{
margin-right:5px;
}

.checkbox{
margin:15px 0;
font-size:13px;
color:#555;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#1a7f64;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#146b54;
}

@media (max-width:500px){

.container{
width:90%;
}

.row{
flex-direction:column;
}

}

</style>

</head>

<body>

<div class="container">

<h2>Contact Us</h2>

<form>

<div class="row">

<div class="input-group">
<label for="fname">First Name *</label>
<input type="text" id="fname" required>
</div>

<div class="input-group">
<label for="lname">Last Name *</label>
<input type="text" id="lname" required>
</div>

</div>

<div class="input-group">
<label for="email">Email Address *</label>
<input type="email" id="email" required>
</div>

<div class="input-group">
<label>Query Type *</label>

<div class="radio-group">
<label>
<input type="radio" name="query"> General Enquiry
</label>

<label>
<input type="radio" name="query"> Support Request
</label>
</div>

</div>

<div class="input-group">
<label for="message">Message *</label>
<textarea id="message" rows="5" required></textarea>
</div>

<div class="checkbox">
<label>
<input type="checkbox"> I consent to being contacted by the team *
</label>
</div>

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
